<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You ❤️</title>

  <link rel="stylesheet" href="style.css" />

  <!-- AOS animations -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    
    <h1 data-aos="fade-down">Hi my love ❤️</h1>

    <img src="IMG_20250402_212702_305.jpg" class="main-img" data-aos="zoom-in"/>

    <p class="message" data-aos="fade-up">
      I made this little world just for you 🌍✨  
      Because you deserve something special 💕
    </p>

    <button onclick="showLove()" data-aos="fade-up">Click me 🥺</button>

    <p id="secret" class="hidden">
      You are my favorite person in the universe 💖  
      And I can’t wait to see you again 🌙✨
    </p>

  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <script src="script.js"></script>
</body>
</html>
